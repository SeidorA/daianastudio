name: Build Daiana Studio candidate image

on:
    workflow_dispatch:
        inputs:
            source_sha:
                description: 'Full source commit SHA from feat/daiana-313'
                required: true
                default: 'ed97cbcc282279870a413350f962d8e3c9aa4e5d'
                type: string

permissions:
    contents: read

concurrency:
    group: daiana-studio-candidate-${{ inputs.source_sha }}
    cancel-in-progress: false

jobs:
    build:
        name: Build and publish candidate
        runs-on: ubuntu-latest
        timeout-minutes: 120
        env:
            IMAGE: cloudseidoranalytics/daianastudio
        steps:
            - name: Check out designated Daiana branch
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  ref: feat/daiana-313
                  fetch-depth: 0
                  persist-credentials: false

            - name: Validate source commit and candidate tag
              id: candidate
              shell: bash
              env:
                  SOURCE_SHA: ${{ inputs.source_sha }}
              run: |
                  set -euo pipefail

                  if [[ ! "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
                      echo "source_sha must be exactly 40 lowercase hexadecimal characters" >&2
                      exit 1
                  fi

                  if ! git cat-file -e "${SOURCE_SHA}^{commit}" 2>/dev/null; then
                      echo "source_sha does not identify a fetched commit" >&2
                      exit 1
                  fi

                  resolved_sha=$(git rev-parse "${SOURCE_SHA}^{commit}")
                  designated_sha=$(git rev-parse HEAD)
                  if ! git merge-base --is-ancestor "$resolved_sha" "$designated_sha"; then
                      echo "source_sha is not an ancestor of feat/daiana-313" >&2
                      exit 1
                  fi

                  tag="sha-${resolved_sha}"
                  status=$(curl --silent --show-error \
                      --output "${RUNNER_TEMP}/dockerhub-tag.json" \
                      --write-out '%{http_code}' \
                      --retry 3 \
                      --retry-all-errors \
                      --connect-timeout 10 \
                      --max-time 30 \
                      "https://hub.docker.com/v2/repositories/${IMAGE}/tags/${tag}")

                  case "$status" in
                      404)
                          ;;
                      200)
                          echo "${IMAGE}:${tag} already exists; refusing to overwrite it" >&2
                          exit 1
                          ;;
                      *)
                          echo "Unable to prove ${IMAGE}:${tag} is absent (Docker Hub HTTP ${status})" >&2
                          exit 1
                          ;;
                  esac

                  git checkout --detach "$resolved_sha"
                  echo "sha=$resolved_sha" >> "$GITHUB_OUTPUT"
                  echo "tag=$tag" >> "$GITHUB_OUTPUT"

            - name: Set up QEMU
              uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

            - name: Log in to Docker Hub
              uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and publish multi-architecture image
              id: build
              uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
              with:
                  context: .
                  file: Dockerfile
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: ${{ env.IMAGE }}:${{ steps.candidate.outputs.tag }}
                  labels: |
                      org.opencontainers.image.source=https://github.com/SeidorA/daianastudio
                      org.opencontainers.image.revision=${{ steps.candidate.outputs.sha }}
                      org.opencontainers.image.version=${{ steps.candidate.outputs.tag }}
                  provenance: mode=max
                  sbom: true

            - name: Report OCI index digest
              shell: bash
              env:
                  DIGEST: ${{ steps.build.outputs.digest }}
                  TAG: ${{ steps.candidate.outputs.tag }}
              run: |
                  set -euo pipefail
                  if [[ ! "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
                      echo "Build did not return a valid OCI index digest" >&2
                      exit 1
                  fi

                  {
                      echo "### Published Daiana Studio candidate"
                      echo
                      echo "- Image: \`${IMAGE}:${TAG}\`"
                      echo "- Source: \`${{ steps.candidate.outputs.sha }}\`"
                      echo "- OCI index digest: \`${DIGEST}\`"
                      echo "- Platforms: \`linux/amd64\`, \`linux/arm64\`"
                  } >> "$GITHUB_STEP_SUMMARY"

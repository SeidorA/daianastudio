version: '3.9'

services:
    redis:
        image: redis:alpine
        container_name: flowise-redis
        ports:
            - '6379:6379'
        volumes:
            - redis_data:/data
        networks:
            - flowise-net

    flowise:
        container_name: flowise-main
        build:
            context: ..
            dockerfile: Dockerfile.optimized
        env_file:
            - .env
        ports:
            - '${PORT:-3000}:3000'
        volumes:
            - /home/aldestark/.flowise:/home/node/.flowise
        environment:
            - MODE=queue
            - QUEUE_NAME=flowise-queue
            - REDIS_URL=redis://redis:6379
        depends_on:
            - redis
        networks:
            - flowise-net

    flowise-worker:
        container_name: flowise-worker
        build:
            context: ..
            dockerfile: docker/worker/Dockerfile
        env_file:
            - .env
        volumes:
            - /home/aldestark/.flowise:/home/node/.flowise
        environment:
            - MODE=queue
            - QUEUE_NAME=flowise-queue
            - REDIS_URL=redis://redis:6379
        depends_on:
            - redis
            - flowise
        networks:
            - flowise-net

volumes:
    redis_data:
        driver: local

networks:
    flowise-net:
        driver: bridge
